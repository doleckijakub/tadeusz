server {
    listen 80;

    auth_basic "Tadeusz";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location /api/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Connection "";
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
    }

    location / {
        root  /usr/share/nginx/html;
        index index.html;
    }
}
